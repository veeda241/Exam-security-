services:
  # ========== Backend API ==========
  - type: web
    name: examguard-api
    runtime: python
    rootDir: server
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-deploy.txt
      python -c "import matplotlib; matplotlib.use('Agg')" 2>/dev/null || true
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MPLBACKEND
        value: "Agg"
      - key: MATPLOTLIB_DONT_INIT
        value: "1"
      - key: PG_HOST
        sync: false
      - key: PG_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

  # ========== Frontend Dashboard ==========
  - type: web
    name: examguard-dashboard
    runtime: static
    rootDir: react-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://examguard-api.onrender.com
