services:
  # ========== Unified Backend + Frontend (Monolithic) ==========
  - type: web
    name: examguard-api
    runtime: python
    rootDir: .
    buildCommand: |
      echo "=== Starting Build ==="
      # Install Python dependencies
      pip install --upgrade pip
      pip install -r server/requirements.txt
      # Build frontend
      cd react-frontend && npm install && npm run build && cd ..
      # Copy frontend build to server/dist
      mkdir -p server/dist
      cp -r react-frontend/dist/* server/dist/
      echo "=== Build Complete ==="
      ls -la server/dist/
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MPLBACKEND
        value: "Agg"
      # Supabase Configuration
      - key: SUPABASE_URL
        value: "https://fpnopsvzvfqwvyqmhgei.supabase.co"
      - key: SUPABASE_KEY
        value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwbm9wc3Z6dmZxd3Z5cW1oZ2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDc4ODUsImV4cCI6MjA4ODEyMzg4NX0.OxJ9mXUJndY3QCjG_nYN5tLdEnyigJ265IrpxQB0dsU"
      # PostgreSQL Configuration (Supabase Pooler)
      - key: PG_HOST
        value: "aws-1-ap-northeast-1.pooler.supabase.com"
      - key: PG_PORT
        value: "6543"
      - key: PG_USER
        value: "postgres.fpnopsvzvfqwvyqmhgei"
      - key: PG_DB
        value: "postgres"
      - key: PG_PASSWORD
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      # Security
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
