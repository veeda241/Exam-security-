<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamGuard Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">ExamGuard Pro</span>
      </div>
      <div id="status-indicator" class="status-indicator inactive">
        <span class="status-dot"></span>
        <span class="status-text">Offline</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Connection Status -->
      <div id="connection-status" class="connection-status">
        <span class="connection-dot"></span>
        <span>Backend Connected</span>
      </div>

      <!-- Student Info Form (shown when inactive) -->
      <section id="setup-section" class="section">
        <h2 class="section-title">Start Exam Session</h2>
        <form id="setup-form" class="form">
          <div class="form-group">
            <label for="student-name">Your Name</label>
            <input type="text" id="student-name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="student-id">Student ID</label>
            <input type="text" id="student-id" placeholder="Enter your student ID" required>
          </div>
          <div class="form-group">
            <label for="exam-id">Exam Code</label>
            <input type="text" id="exam-id" placeholder="Enter exam code" required>
          </div>

          <div class="permissions-check">
            <h3>Required Permissions</h3>
            <div class="permission-item">
              <span class="permission-icon" id="perm-screen">⬜</span>
              <span>Screen Sharing</span>
            </div>
            <div class="permission-item">
              <span class="permission-icon" id="perm-webcam">⬜</span>
              <span>Webcam Access</span>
            </div>
            <div class="permission-item">
              <span class="permission-icon" id="perm-backend">⬜</span>
              <span>Backend Connection</span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="start-btn">
            <span class="btn-icon">▶️</span>
            Start Proctoring
          </button>
        </form>
      </section>

      <!-- Active Session Panel (shown when active) -->
      <section id="active-section" class="section hidden">
        <div class="session-info">
          <div class="session-badge">
            <span class="pulse"></span>
            Recording
          </div>
          <p class="session-id">ID: <span id="session-id-display">---</span></p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-icon">🔄</span>
            <span class="stat-value" id="stat-tabs">0</span>
            <span class="stat-label">Tab Switches</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon">📋</span>
            <span class="stat-value" id="stat-copy">0</span>
            <span class="stat-label">Copy/Paste</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon">📝</span>
            <span class="stat-value" id="stat-events">0</span>
            <span class="stat-label">Total Events</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon">⏱️</span>
            <span class="stat-value" id="stat-time">00:00</span>
            <span class="stat-label">Duration</span>
          </div>
        </div>

        <div class="capture-status">
          <div class="capture-item">
            <span id="screen-status" class="capture-icon active">📸</span>
            <span>Screen</span>
          </div>
          <div class="capture-item">
            <span id="webcam-status" class="capture-icon active">📹</span>
            <span>Webcam</span>
          </div>
          <div class="capture-item">
            <span id="sync-status" class="capture-icon active">☁️</span>
            <span>Sync</span>
          </div>
        </div>

        <button id="stop-btn" class="btn btn-danger">
          <span class="btn-icon">⏹️</span>
          End Exam Session
        </button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Secure • Reliable • Fair</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
