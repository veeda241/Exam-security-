<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamGuard Pro | Student Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        select,
        input {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            overflow: hidden;
        }

        th,
        td {
            text-align: left;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: var(--text-secondary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-safe {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge-review {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge-suspicious {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .score-bar {
            width: 100px;
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-fill {
            height: 100%;
            background-color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🛡️ ExamGuard Pro | Live Analysis</h1>
            <div>
                <span id="currentTime" style="color: var(--text-secondary);"></span>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="card">
                <div class="metric-value" id="totalStudents">0</div>
                <div class="metric-label">Active Students</div>
            </div>
            <div class="card">
                <div class="metric-value" id="highRiskCount" style="color: var(--danger);">0</div>
                <div class="metric-label">High Risk Alerts</div>
            </div>
            <div class="card">
                <div class="metric-value" id="avgEngagement">0%</div>
                <div class="metric-label">Avg. Engagement</div>
            </div>
            <div class="card">
                <div class="metric-value" id="avgEffort">0%</div>
                <div class="metric-label">Avg. Effort Alignment</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search student..." onkeyup="filterTable()">
            <select id="statusFilter" onchange="filterTable()">
                <option value="all">All Status</option>
                <option value="safe">Safe</option>
                <option value="review">Review Needed</option>
                <option value="suspicious">Suspicious</option>
            </select>
            <button onclick="exportData()">Export Report (CSV)</button>
            <button onclick="fetchData()"
                style="margin-left: auto; background-color: var(--bg-card); border: 1px solid var(--border);">🔄
                Refresh</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Status</th>
                        <th>Risk Score</th>
                        <th>Engagement</th>
                        <th>Effort Alignment</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <tr>
                        <td colspan="6" class="loading">Loading analysis data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
